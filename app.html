<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#3AAFA9">
<title>Chaskis — Suivi de commande</title>
<meta name="description" content="Suivez votre livraison Chaskis en direct.">
<meta name="robots" content="noindex, nofollow">
<link rel="canonical" href="https://www.chaskis.ch/app">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/icons/icon-192.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800;900&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --teal:#3AAFA9;--teal-d:#2A8A85;--teal-bg:#EDF7F6;
  --purple:#6B4FA0;--purple-bg:#F0EBF9;
  --ink:#1A1A1A;--ink-mid:#4A4A4A;--ink-muted:#9A9A9A;
  --bg:#FAFAF7;--white:#FFFFFF;--line:#E8E8E4;
  --r:12px;--rl:16px;--rxl:20px;--pill:999px;
  --ease:cubic-bezier(.25,.46,.45,.94);
  --safe-top:env(safe-area-inset-top);
  --safe-bot:env(safe-area-inset-bottom);
}
html,body{min-height:100%;background:var(--bg);font-family:'Urbanist',sans-serif;color:var(--ink)}
input,button,select,textarea{font-family:'Urbanist',sans-serif}
a{color:inherit;text-decoration:none}

/* ===== LAYOUT ===== */
.app-shell{min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:var(--bg);position:relative;padding-bottom:calc(20px + var(--safe-bot))}

.app-header{display:flex;align-items:center;justify-content:space-between;padding:calc(16px + var(--safe-top)) 20px 14px;background:var(--white);border-bottom:1px solid rgba(0,0,0,.06);position:sticky;top:0;z-index:10}
.app-header-logo svg{width:40px;height:auto;display:block}
.app-header h1{font-size:.78rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-muted)}
.app-header-right{display:flex;align-items:center;gap:6px}
.hdr-btn{background:none;border:none;cursor:pointer;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--ink-mid);transition:background .15s}
.hdr-btn:hover{background:#F4F3F0}
.hdr-btn svg{width:18px;height:18px}

.app-content{flex:1;padding:20px;display:flex;flex-direction:column;gap:16px}

/* ===== LIST SCREEN ===== */
.section-title{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-muted);margin-bottom:8px}

.order-card{background:var(--white);border-radius:var(--rxl);padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;transition:all .2s;border:1.5px solid transparent}
.order-card:hover{border-color:var(--teal);transform:translateY(-1px)}
.order-card:active{transform:translateY(0);opacity:.85}
.oc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px}
.oc-code{font-size:.82rem;font-weight:800;font-family:'Urbanist',sans-serif;letter-spacing:.01em}
.oc-badge{font-size:.6rem;font-weight:800;padding:3px 9px;border-radius:var(--pill);text-transform:uppercase;letter-spacing:.05em}
.oc-badge.confirmed{background:rgba(107,79,160,.12);color:#6B4FA0}
.oc-badge.pickup{background:rgba(255,165,0,.14);color:#B86A00}
.oc-badge.en-route{background:rgba(58,175,169,.14);color:var(--teal-d)}
.oc-badge.delivered{background:rgba(120,160,120,.14);color:#2E7D32}
.oc-route{font-size:.76rem;color:var(--ink-mid);line-height:1.55;margin-bottom:10px}
.oc-route b{color:var(--ink);font-weight:700}
.oc-meta{display:flex;align-items:center;justify-content:space-between;font-size:.68rem;color:var(--ink-muted)}
.oc-meta-r{display:inline-flex;align-items:center;gap:4px;color:var(--teal-d);font-weight:700}
.oc-meta-r svg{width:10px;height:10px}

/* ===== EMPTY STATE ===== */
.empty-wrap{padding:48px 20px;text-align:center;background:var(--white);border:1.5px dashed var(--line);border-radius:var(--rxl)}
.empty-wrap svg{width:44px;height:44px;color:var(--ink-muted);opacity:.5;margin:0 auto 14px;display:block}
.empty-wrap h3{font-size:1.05rem;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.empty-wrap p{font-size:.8rem;color:var(--ink-muted);line-height:1.5;max-width:280px;margin:0 auto 18px}
.empty-actions{display:flex;flex-direction:column;gap:8px;max-width:280px;margin:0 auto}

/* ===== BUTTONS ===== */
.btn-pri{width:100%;padding:14px 18px;border-radius:var(--rl);background:var(--teal);color:#fff;font-weight:800;font-size:.92rem;border:none;cursor:pointer;transition:all .18s;letter-spacing:-.01em;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-pri:hover{background:var(--teal-d)}
.btn-pri:active{transform:scale(.98)}
.btn-sec{width:100%;padding:12px 16px;border-radius:var(--rl);background:var(--white);color:var(--ink);font-weight:700;font-size:.88rem;border:1.5px solid var(--line);cursor:pointer;transition:all .18s}
.btn-sec:hover{border-color:var(--teal);color:var(--teal-d)}
.btn-ghost{background:none;border:none;color:var(--teal-d);font-weight:700;font-size:.82rem;cursor:pointer;padding:8px 4px;text-decoration:underline;text-decoration-color:transparent;transition:text-decoration-color .15s}
.btn-ghost:hover{text-decoration-color:currentColor}

/* ===== DETAIL SCREEN ===== */
.detail-wrap{display:flex;flex-direction:column;gap:14px}
.back-btn{align-self:flex-start;background:none;border:none;color:var(--ink-mid);font-size:.78rem;font-weight:700;cursor:pointer;padding:4px 8px 4px 0;display:inline-flex;align-items:center;gap:6px;margin-bottom:-4px}
.back-btn:hover{color:var(--ink)}
.back-btn svg{width:14px;height:14px}

.detail-head{background:var(--white);border-radius:var(--rxl);padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.dh-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
.dh-code-lbl{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-muted);margin-bottom:3px}
.dh-code{font-size:1.15rem;font-weight:900;letter-spacing:-.01em}
.dh-route{background:var(--bg);border-radius:var(--r);padding:12px 14px;margin-bottom:12px}
.dh-route-row{display:flex;gap:10px;align-items:flex-start;padding:4px 0}
.dh-route-ic{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.66rem;font-weight:800;margin-top:1px}
.dh-route-ic.a{background:var(--teal-bg);color:var(--teal)}
.dh-route-ic.b{background:var(--purple-bg);color:var(--purple)}
.dh-route-ic.b-extra{background:#F4F3F0;color:var(--ink-mid)}
.dh-route-txt{font-size:.78rem;color:var(--ink);line-height:1.4;flex:1;min-width:0;word-break:break-word}
.dh-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:.7rem;color:var(--ink-muted)}
.dh-meta b{color:var(--ink);font-weight:700}

.timeline-card{background:var(--white);border-radius:var(--rxl);padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tl-title{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-muted);margin-bottom:16px}
.tl-step{display:flex;gap:14px;padding:8px 0;position:relative}
.tl-step:not(:last-child)::before{content:'';position:absolute;top:28px;left:11px;bottom:-8px;width:2px;background:var(--line);border-radius:1px}
.tl-step.done:not(:last-child)::before{background:var(--teal)}
.tl-dot{width:24px;height:24px;border-radius:50%;border:2px solid var(--line);background:var(--white);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s;z-index:1}
.tl-dot svg{width:11px;height:11px;color:var(--ink-muted)}
.tl-step.done .tl-dot{background:var(--teal);border-color:var(--teal)}
.tl-step.done .tl-dot svg{color:#fff}
.tl-step.active .tl-dot{border-color:var(--teal);box-shadow:0 0 0 4px rgba(58,175,169,.18)}
.tl-step.active .tl-dot svg{color:var(--teal)}
.tl-step.active .tl-dot::after{content:'';position:absolute;width:36px;height:36px;border-radius:50%;border:2px solid var(--teal);animation:tl-pulse 1.5s ease-out infinite;opacity:0}
@keyframes tl-pulse{0%{transform:scale(.8);opacity:.8}100%{transform:scale(1.4);opacity:0}}
.tl-body{flex:1;padding-top:3px}
.tl-label{font-size:.86rem;font-weight:700;color:var(--ink-mid);line-height:1.3;margin-bottom:2px}
.tl-step.done .tl-label{color:var(--ink)}
.tl-step.active .tl-label{color:var(--teal-d);font-weight:800}
.tl-hint{font-size:.7rem;color:var(--ink-muted);line-height:1.45}

.share-card{background:var(--white);border:1.5px solid var(--line);border-radius:var(--rxl);padding:16px;display:flex;align-items:center;gap:12px}
.share-card-info{flex:1;min-width:0}
.share-card-info strong{display:block;font-size:.78rem;font-weight:700;color:var(--ink);margin-bottom:2px}
.share-card-info span{font-size:.68rem;color:var(--ink-muted)}
.share-card-btn{padding:8px 14px;background:var(--teal-bg);border:1px solid rgba(58,175,169,.25);color:var(--teal-d);font-weight:700;font-size:.74rem;border-radius:var(--pill);cursor:pointer;flex-shrink:0;transition:all .15s}
.share-card-btn:hover{background:var(--teal);color:#fff;border-color:var(--teal)}
.share-card-btn.copied{background:var(--teal);color:#fff;border-color:var(--teal)}

/* ===== ADD CODE OVERLAY ===== */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(26,26,26,.5);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;animation:ov-fade .2s ease}
.overlay.show{display:flex}
@keyframes ov-fade{from{opacity:0}to{opacity:1}}
.overlay-card{width:100%;max-width:480px;background:var(--white);border-radius:20px 20px 0 0;padding:24px 20px calc(24px + var(--safe-bot));animation:ov-slide .3s var(--ease);display:flex;flex-direction:column;gap:12px}
@media (min-width:520px){.overlay{align-items:center}.overlay-card{border-radius:20px;margin:20px}}
@keyframes ov-slide{from{transform:translateY(100%)}to{transform:none}}
.overlay-card h3{font-size:1.05rem;font-weight:900;letter-spacing:-.02em}
.overlay-card p{font-size:.82rem;color:var(--ink-muted);line-height:1.5;margin-bottom:6px}
.overlay-card input{width:100%;padding:14px 16px;border:1.5px solid var(--line);border-radius:var(--rl);font-size:.95rem;outline:none;text-transform:uppercase;letter-spacing:.04em;font-weight:700;transition:all .2s;background:var(--bg)}
.overlay-card input:focus{border-color:var(--teal);background:var(--white);box-shadow:0 0 0 3px rgba(58,175,169,.1)}
.overlay-err{font-size:.74rem;color:#DC2626;display:none}
.overlay-err.show{display:block}
.overlay-actions{display:flex;gap:8px;margin-top:4px}
.overlay-actions button{flex:1}

/* ===== INSTALL BANNER ===== */
#install-bar{position:fixed;top:0;left:0;right:0;z-index:500;background:linear-gradient(135deg,#6B4FA0,#8B6FC0);padding:calc(12px + var(--safe-top)) 16px 12px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 16px rgba(107,79,160,.3);animation:slide-down .4s cubic-bezier(.33,1,.68,1) both}
@keyframes slide-down{from{transform:translateY(-100%)}to{transform:translateY(0)}}
#install-bar .ib-text{flex:1;color:#fff;min-width:0}
#install-bar .ib-text strong{font-size:.84rem;font-weight:800;display:block}
#install-bar .ib-text span{font-size:.72rem;opacity:.85;line-height:1.4}
#install-bar .ib-btn{padding:9px 18px;background:#fff;color:#6B4FA0;font-weight:800;font-size:.82rem;border:none;border-radius:999px;cursor:pointer;white-space:nowrap;font-family:'Urbanist',sans-serif}
#install-bar .ib-btn:active{transform:scale(.95)}
#install-bar .ib-close{background:none;border:none;color:rgba(255,255,255,.6);font-size:1.2rem;cursor:pointer;padding:4px 8px;flex-shrink:0;line-height:1}

/* ===== TOAST ===== */
.toast{position:fixed;top:calc(16px + var(--safe-top));left:50%;transform:translateX(-50%) translateY(-100%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:var(--pill);font-size:.78rem;font-weight:700;z-index:200;opacity:0;transition:all .25s var(--ease);white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@keyframes fade-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade-in{animation:fade-in .35s ease both}
</style>
</head>
<body>

<div class="app-shell">

  <!-- Header -->
  <header class="app-header">
    <a href="index.html" class="app-header-logo" aria-label="Chaskis">
      <svg viewBox="0 0 32 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M5.29028 20H23.3109H23.3208V14.8356H5.30018V12.9691C5.30018 11.9052 5.93423 10.9284 6.9051 10.4642L16.9903 5.69632C17.7234 5.34816 18.5457 5.16441 19.3581 5.16441H23.3108V14.8356C23.3108 14.8356 31.9497 14.5938 31.9497 5.16439H23.3208V0H19.3581C17.7432 0 16.1284 0.357834 14.682 1.04449L4.58689 5.82205C1.80305 7.13733 0 9.94197 0 12.9691V14.8356C0 17.6789 2.36775 20 5.29028 20Z" fill="#3AAFA9"/>
      </svg>
    </a>
    <h1 id="appTitle">Suivi</h1>
    <div class="app-header-right">
      <button class="hdr-btn" id="addCodeBtn" aria-label="Ajouter un code" title="Ajouter un code">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </header>

  <!-- Main content: dynamic rendering (list or detail) -->
  <main class="app-content" id="appContent"></main>

</div>

<!-- ===== ADD CODE OVERLAY ===== -->
<div class="overlay" id="addOverlay" role="dialog" aria-labelledby="addOvTitle" aria-modal="true">
  <div class="overlay-card">
    <h3 id="addOvTitle">Suivre une commande</h3>
    <p>Entrez le code reçu par email après votre commande (format CH-XXXXXXXX).</p>
    <input type="text" id="addOvInput" placeholder="CH-XXXXXXXX" autocomplete="off" spellcheck="false" maxlength="11">
    <div class="overlay-err" id="addOvErr">Code invalide. Format attendu : CH-XXXXXXXX.</div>
    <div class="overlay-actions">
      <button class="btn-sec" id="addOvCancel">Annuler</button>
      <button class="btn-pri" id="addOvSubmit">Suivre</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script>
const ORDERS_KEY = 'chaskis_orders';
const STATUSES = [
  { key:'confirmed', label:'Commande confirmée', hint:'Votre demande a été enregistrée.', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>' },
  { key:'pickup',    label:'Retrait en cours',   hint:'Un coursier est en route vers le point de retrait.', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 7L9 18l-5-5"/><path d="M20 7L9 18l-5-5" style="opacity:0"/></svg>' },
  { key:'en-route',  label:'En route',            hint:'Le colis est acheminé vers la destination.', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>' },
  { key:'delivered', label:'Livré',               hint:'Le colis a été remis au destinataire.', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>' },
];
const STATUS_LABEL = { confirmed:'Confirmée', pickup:'Retrait', 'en-route':'En route', delivered:'Livrée' };

// ===== STORAGE HELPERS =====
function loadOrders() {
  try {
    const raw = localStorage.getItem(ORDERS_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr.filter(o => o && o.code) : [];
  } catch (e) { return []; }
}
function saveOrders(list) {
  localStorage.setItem(ORDERS_KEY, JSON.stringify(list));
}
function upsertOrder(order) {
  const list = loadOrders();
  const filtered = list.filter(o => o.code !== order.code);
  filtered.unshift(order);
  saveOrders(filtered.slice(0, 20));
}
function findOrder(code) {
  return loadOrders().find(o => o.code === code) || null;
}

// ===== STATUS MOCK (derived from createdAt) =====
// Provides a "live" feel without a backend: status progresses over time.
function deriveStatus(order) {
  if (!order || !order.createdAt) return 'confirmed';
  if (order.status === 'delivered') return 'delivered';
  const elapsed = (Date.now() - order.createdAt) / 1000;
  if (elapsed < 60)  return 'confirmed';
  if (elapsed < 180) return 'pickup';
  if (elapsed < 360) return 'en-route';
  return 'delivered';
}
function etaFromStatus(order, status) {
  const total = 360; // 6 minutes for the mock full cycle
  const elapsed = Math.max(0, (Date.now() - order.createdAt) / 1000);
  const left = Math.max(0, total - elapsed);
  if (status === 'delivered') return 'Livré';
  const mins = Math.ceil(left / 60);
  return '~' + mins + ' min';
}

// ===== ROUTING =====
// State lives in the URL: ?code=CH-XXX opens detail; otherwise list.
function currentCode() {
  const u = new URL(location.href);
  return u.searchParams.get('code');
}
function goDetail(code) {
  const u = new URL(location.href);
  u.searchParams.set('code', code);
  history.pushState({ code }, '', u);
  render();
}
function goList() {
  const u = new URL(location.href);
  u.searchParams.delete('code');
  history.pushState({}, '', u);
  render();
}
window.addEventListener('popstate', render);

// ===== RENDER =====
function render() {
  const code = currentCode();
  const titleEl = document.getElementById('appTitle');
  const content = document.getElementById('appContent');

  if (code) {
    // Auto-add to localStorage if not already there (deep link case)
    let order = findOrder(code);
    if (!order) {
      order = { code, createdAt: Date.now(), pickup:null, stops:[], contact:null, status:'confirmed', trackUrl: location.origin + '/suivi/' + code, _synthetic:true };
      upsertOrder(order);
    }
    titleEl.textContent = 'Commande';
    renderDetail(order);
    return;
  }

  titleEl.textContent = 'Suivi';
  renderList();
}

function renderList() {
  const orders = loadOrders();
  const content = document.getElementById('appContent');

  if (orders.length === 0) {
    content.innerHTML = `
      <div class="empty-wrap fade-in">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M7 8V6a5 5 0 0 1 10 0v2"/></svg>
        <h3>Aucune commande suivie</h3>
        <p>Passez une commande et votre suivi s'affichera ici automatiquement. Vous pouvez aussi ajouter un code manuellement.</p>
        <div class="empty-actions">
          <a class="btn-pri" href="commander.html">Commander une course</a>
          <button class="btn-sec" id="empAddCode">J'ai un code</button>
        </div>
      </div>`;
    document.getElementById('empAddCode').addEventListener('click', openAddOverlay);
    return;
  }

  // Active orders first (derived), then delivered
  const derived = orders.map(o => ({ ...o, _status: deriveStatus(o) }));
  const active = derived.filter(o => o._status !== 'delivered');
  const done   = derived.filter(o => o._status === 'delivered');

  let html = '';
  if (active.length) {
    html += `<div class="section-title">En cours</div>`;
    html += `<div style="display:flex;flex-direction:column;gap:10px">`;
    html += active.map(o => orderCardHtml(o)).join('');
    html += `</div>`;
  }
  if (done.length) {
    html += `<div class="section-title" style="margin-top:14px">Historique</div>`;
    html += `<div style="display:flex;flex-direction:column;gap:10px">`;
    html += done.map(o => orderCardHtml(o)).join('');
    html += `</div>`;
  }
  html += `
    <div style="margin-top:20px;display:flex;flex-direction:column;gap:8px">
      <a class="btn-pri" href="commander.html">Commander une nouvelle course</a>
    </div>`;
  content.innerHTML = html;

  // Attach click handlers
  content.querySelectorAll('.order-card').forEach(el => {
    el.addEventListener('click', () => goDetail(el.dataset.code));
  });
}

function orderCardHtml(order) {
  const s = order._status || deriveStatus(order);
  const routeFrom = order.pickup && (order.pickup.label || order.pickup.addr) || 'Adresse de retrait';
  const firstStop = order.stops && order.stops[0];
  const routeTo = firstStop ? (firstStop.label || firstStop.addr) : 'Adresse de livraison';
  const extra = order.stops && order.stops.length > 1 ? ` + ${order.stops.length - 1}` : '';
  return `
    <div class="order-card fade-in" data-code="${order.code}" role="button" tabindex="0">
      <div class="oc-head">
        <span class="oc-code">${order.code}</span>
        <span class="oc-badge ${s}">${STATUS_LABEL[s]}</span>
      </div>
      <div class="oc-route">
        <b>A.</b> ${shortAddr(routeFrom)}<br>
        <b>B.</b> ${shortAddr(routeTo)}${extra ? `<span style="color:var(--ink-muted)">${extra}</span>` : ''}
      </div>
      <div class="oc-meta">
        <span>${formatDate(order.createdAt)}</span>
        <span class="oc-meta-r">
          ${s === 'delivered' ? 'Voir le détail' : etaFromStatus(order, s)}
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </span>
      </div>
    </div>`;
}

function renderDetail(order) {
  const s = deriveStatus(order);
  const currentIdx = STATUSES.findIndex(st => st.key === s);
  const content = document.getElementById('appContent');

  const stopsHtml = (order.stops || []).map((stop, i) => `
    <div class="dh-route-row">
      <div class="dh-route-ic ${i === 0 ? 'b' : 'b-extra'}">${i === 0 ? 'B' : (i + 1)}</div>
      <div class="dh-route-txt">${stop.label || stop.addr || 'Adresse de livraison'}</div>
    </div>`).join('');

  const priceMeta = order.pricing && order.pricing.totalTTC != null
    ? `<span><b>Total :</b> CHF ${formatCHF(order.pricing.totalTTC)} TTC</span>` : '';
  const contactMeta = order.contact && order.contact.email
    ? `<span><b>Alertes :</b> ${order.contact.email}</span>` : '';

  const timelineHtml = STATUSES.map((st, i) => {
    const cls = i < currentIdx ? 'done' : (i === currentIdx ? 'active' : '');
    return `
      <div class="tl-step ${cls}">
        <div class="tl-dot">${st.icon}</div>
        <div class="tl-body">
          <div class="tl-label">${st.label}</div>
          <div class="tl-hint">${st.hint}</div>
        </div>
      </div>`;
  }).join('');

  const trackUrl = order.trackUrl || (location.origin + '/suivi/' + order.code);

  content.innerHTML = `
    <button class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      Toutes mes commandes
    </button>

    <div class="detail-head fade-in">
      <div class="dh-top">
        <div>
          <div class="dh-code-lbl">Numéro</div>
          <div class="dh-code">${order.code}</div>
        </div>
        <span class="oc-badge ${s}">${STATUS_LABEL[s]}</span>
      </div>
      <div class="dh-route">
        <div class="dh-route-row">
          <div class="dh-route-ic a">A</div>
          <div class="dh-route-txt">${order.pickup && (order.pickup.label || order.pickup.addr) || 'Adresse de retrait non renseignée'}</div>
        </div>
        ${stopsHtml || `<div class="dh-route-row"><div class="dh-route-ic b">B</div><div class="dh-route-txt" style="color:var(--ink-muted)">Adresse de livraison non disponible</div></div>`}
      </div>
      <div class="dh-meta">
        <span><b>${formatDate(order.createdAt)}</b></span>
        ${priceMeta}
        ${contactMeta}
      </div>
    </div>

    <div class="timeline-card fade-in" style="animation-delay:.05s">
      <div class="tl-title">Progression ${s !== 'delivered' ? '· ETA ' + etaFromStatus(order, s) : ''}</div>
      ${timelineHtml}
    </div>

    <div class="share-card fade-in" style="animation-delay:.1s">
      <div class="share-card-info">
        <strong>Partager le suivi</strong>
        <span>Lien direct pour votre destinataire</span>
      </div>
      <button class="share-card-btn" id="shareBtn" data-link="${trackUrl}">Copier</button>
    </div>
  `;

  document.getElementById('backBtn').addEventListener('click', goList);
  document.getElementById('shareBtn').addEventListener('click', e => {
    const link = e.currentTarget.dataset.link;
    navigator.clipboard?.writeText(link).then(() => {
      e.currentTarget.textContent = 'Copié !';
      e.currentTarget.classList.add('copied');
      showToast('Lien de suivi copié');
      setTimeout(() => {
        e.currentTarget.textContent = 'Copier';
        e.currentTarget.classList.remove('copied');
      }, 1800);
    });
  });
}

// ===== HELPERS =====
function shortAddr(s) {
  if (!s) return '';
  // Keep first part before comma, else truncate
  const comma = s.indexOf(',');
  if (comma > 0) return s.slice(0, comma);
  return s.length > 42 ? s.slice(0, 40) + '…' : s;
}
function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const today = new Date();
  const sameDay = d.toDateString() === today.toDateString();
  const hm = d.toLocaleTimeString('fr-CH', { hour:'2-digit', minute:'2-digit' });
  if (sameDay) return `Aujourd'hui ${hm}`;
  const yd = new Date(); yd.setDate(yd.getDate() - 1);
  if (d.toDateString() === yd.toDateString()) return `Hier ${hm}`;
  return d.toLocaleDateString('fr-CH', { day:'2-digit', month:'short' }) + ' ' + hm;
}
function formatCHF(n) {
  return (Math.round(n * 100) / 100).toFixed(2).replace('.', ',');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), 2200);
}

// ===== ADD CODE OVERLAY =====
const addOverlay = document.getElementById('addOverlay');
const addOvInput = document.getElementById('addOvInput');
const addOvErr = document.getElementById('addOvErr');

function openAddOverlay() {
  addOvInput.value = '';
  addOvErr.classList.remove('show');
  addOverlay.classList.add('show');
  setTimeout(() => addOvInput.focus(), 80);
}
function closeAddOverlay() {
  addOverlay.classList.remove('show');
}
document.getElementById('addCodeBtn').addEventListener('click', openAddOverlay);
document.getElementById('addOvCancel').addEventListener('click', closeAddOverlay);
addOverlay.addEventListener('click', e => { if (e.target === addOverlay) closeAddOverlay(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && addOverlay.classList.contains('show')) closeAddOverlay();
});
document.getElementById('addOvSubmit').addEventListener('click', submitAddCode);
addOvInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitAddCode(); });
addOvInput.addEventListener('input', () => {
  addOvInput.value = addOvInput.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
  addOvErr.classList.remove('show');
});

function submitAddCode() {
  const raw = addOvInput.value.trim().toUpperCase();
  // Accept with or without "CH-" prefix
  const code = raw.startsWith('CH-') ? raw : 'CH-' + raw;
  if (!/^CH-[A-Z0-9]{6,10}$/.test(code)) {
    addOvErr.classList.add('show');
    return;
  }
  closeAddOverlay();
  goDetail(code);
}

// ===== PWA INSTALL BANNER =====
let _pwaPrompt = null;
const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _pwaPrompt = e;
  showInstallBanner('native');
});
window.addEventListener('appinstalled', () => {
  _pwaPrompt = null;
  const b = document.getElementById('install-bar');
  if (b) b.remove();
});

function showInstallBanner(type) {
  if (isStandalone) return;
  let existing = document.getElementById('install-bar');
  if (existing) existing.remove();

  const bar = document.createElement('div');
  bar.id = 'install-bar';
  if (type === 'native') {
    bar.innerHTML = `
      <div class="ib-text"><strong>Installer Chaskis</strong><span>Accès rapide au suivi depuis l'écran d'accueil</span></div>
      <button class="ib-btn" onclick="doNativeInstall()">Installer</button>
      <button class="ib-close" onclick="this.parentElement.remove()">&times;</button>`;
  } else {
    const hint = isIOS
      ? 'Appuyez sur <strong>Partager ↑</strong> puis <strong>"Sur l\'écran d\'accueil"</strong>'
      : 'Appuyez sur <strong>⋮</strong> puis <strong>"Ajouter à l\'écran d\'accueil"</strong>';
    bar.innerHTML = `
      <div class="ib-text"><strong>Ajouter Chaskis à l'écran d'accueil</strong><span>${hint}</span></div>
      <button class="ib-close" onclick="this.parentElement.remove()">&times;</button>`;
  }
  document.body.prepend(bar);
}
function doNativeInstall() {
  if (!_pwaPrompt) return;
  _pwaPrompt.prompt();
  _pwaPrompt.userChoice.then(() => {
    _pwaPrompt = null;
    const b = document.getElementById('install-bar');
    if (b) b.remove();
  });
}
if (!isStandalone) {
  setTimeout(() => { if (!_pwaPrompt) showInstallBanner('manual'); }, 3000);
}

// ===== SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ===== BOOT =====
// Refresh the list/detail every 30s so the mocked status progresses while the tab is open.
render();
setInterval(() => {
  // Only re-render if we're on the detail screen or the list with active orders.
  const code = currentCode();
  if (code) render();
  else {
    const orders = loadOrders();
    if (orders.some(o => deriveStatus(o) !== 'delivered')) render();
  }
}, 30000);
</script>
