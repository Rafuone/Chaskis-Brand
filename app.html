<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#3AAFA9">
<title>Chaskis — Suivi de commande</title>
<meta name="description" content="Suivez votre livraison Chaskis en direct.">
<meta name="robots" content="noindex, nofollow">
<link rel="canonical" href="https://www.chaskis.ch/app">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/icons/icon-192.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800;900&display=swap">
<link rel="stylesheet" href="assets/css/pages/app.css?v=20260707c">
</head>
<body>

<div class="app-shell">

  <!-- Header -->
  <header class="app-header">
    <a href="index.html" class="app-header-logo" aria-label="Chaskis">
      <svg viewBox="0 0 32 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M5.29028 20H23.3109H23.3208V14.8356H5.30018V12.9691C5.30018 11.9052 5.93423 10.9284 6.9051 10.4642L16.9903 5.69632C17.7234 5.34816 18.5457 5.16441 19.3581 5.16441H23.3108V14.8356C23.3108 14.8356 31.9497 14.5938 31.9497 5.16439H23.3208V0H19.3581C17.7432 0 16.1284 0.357834 14.682 1.04449L4.58689 5.82205C1.80305 7.13733 0 9.94197 0 12.9691V14.8356C0 17.6789 2.36775 20 5.29028 20Z" fill="#3AAFA9"/>
      </svg>
    </a>
    <h1 id="appTitle">Suivi</h1>
    <div class="app-header-right">
      <button class="hdr-btn" id="addCodeBtn" aria-label="Ajouter un code" title="Ajouter un code">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </header>

  <!-- Main content: dynamic rendering (list or detail) -->
  <main class="app-content" id="appContent"></main>

</div>

<!-- ===== ADD CODE OVERLAY ===== -->
<div class="overlay" id="addOverlay" role="dialog" aria-labelledby="addOvTitle" aria-modal="true">
  <div class="overlay-card">
    <h3 id="addOvTitle">Suivre une commande</h3>
    <p>Entrez le code reçu par email après votre commande (format CH-XXXXXXXX).</p>
    <input type="text" id="addOvInput" placeholder="CH-XXXXXXXX" autocomplete="off" spellcheck="false" maxlength="11">
    <div class="overlay-err" id="addOvErr">Code invalide. Format attendu : CH-XXXXXXXX.</div>
    <div class="overlay-actions">
      <button class="btn-sec" id="addOvCancel">Annuler</button>
      <button class="btn-pri" id="addOvSubmit">Suivre</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script src="assets/js/pages/app.js?v=20260707c"></script>
</body>
</html>
